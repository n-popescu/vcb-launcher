name: build

# Build the launcher for Linux, Windows and macOS automatically on every commit
# (any branch), on tags, and on demand. Tagged `v*` pushes also publish a release.
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: vcb-launcher-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: vcb-launcher-windows-x86_64.exe
          - os: macos-latest
            name: macos-universal
            artifact: vcb-launcher-macos-universal
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libgl1-mesa-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      # --- Linux / Windows: native release build + tests ---
      - name: Build & test (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          cargo test --release --locked
          cargo build --release --locked

      # --- macOS: test on the host, then build both arches and fuse a universal binary ---
      - name: Build & test (macOS universal)
        if: runner.os == 'macOS'
        run: |
          cargo test --release --locked
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          lipo -create -output vcb-launcher-macos \
            target/x86_64-apple-darwin/release/vcb-launcher \
            target/aarch64-apple-darwin/release/vcb-launcher

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          case "${{ runner.os }}" in
            Windows) cp target/release/vcb-launcher.exe "dist/${{ matrix.artifact }}" ;;
            macOS)   cp vcb-launcher-macos            "dist/${{ matrix.artifact }}" ;;
            *)       cp target/release/vcb-launcher    "dist/${{ matrix.artifact }}" ;;
          esac

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
