name: build

# Build the launcher for Linux, Windows and macOS automatically on every commit
# (any branch), on tags, and on demand. A GitHub Release is published automatically when a
# version bump lands on `main` (the `release` job tags `v<version>` from Cargo.toml), and
# also on a manual `v*` tag push.
#
# The launcher's procedural icon is baked into the executable so it shows before launch:
#   - Windows: build.rs embeds a multi-resolution .ico as the .exe icon resource.
#   - macOS:   the universal binary is wrapped in a .app bundle with a generated .icns.
#   - Linux:   a bare ELF can't embed an icon, so a .desktop + .png ship alongside it for
#              desktop-menu integration.
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: windows-latest
            name: windows-x86_64
          - os: macos-latest
            name: macos-universal
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libgl1-mesa-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      # --- Linux / Windows: native release build + tests ---
      # On Windows, build.rs embeds the icon into vcb-launcher.exe here.
      - name: Build & test (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          cargo test --release --locked
          cargo build --release --locked

      # --- macOS: test on the host, then build both arches and fuse a universal binary ---
      - name: Build & test (macOS universal)
        if: runner.os == 'macOS'
        run: |
          cargo test --release --locked
          cargo build --release --locked --target x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          lipo -create -output vcb-launcher-macos \
            target/x86_64-apple-darwin/release/vcb-launcher \
            target/aarch64-apple-darwin/release/vcb-launcher

      # --- Package per OS (icon lives on the app, not just the running window) ---
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cargo run --release --locked --bin gen-icons -- icons
          case "${{ runner.os }}" in
            Windows)
              # The .ico is embedded in the exe by build.rs; ship the single file.
              cp target/release/vcb-launcher.exe "dist/vcb-launcher-windows-x86_64.exe"
              ;;
            Linux)
              # A bare ELF carries no icon; ship the binary plus desktop-integration files.
              cp target/release/vcb-launcher "dist/vcb-launcher-linux-x86_64"
              cp icons/vcb-launcher.png "dist/vcb-launcher.png"
              cp packaging/vcb-launcher.desktop "dist/vcb-launcher.desktop"
              ;;
            macOS)
              # Wrap the universal binary in a .app bundle so Finder/Dock show the icon.
              APP="dist/VCB Mod Launcher.app"
              mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
              cp vcb-launcher-macos "$APP/Contents/MacOS/vcb-launcher"
              chmod +x "$APP/Contents/MacOS/vcb-launcher"
              iconutil -c icns "icons/VCB Mod Launcher.iconset" -o "$APP/Contents/Resources/vcb-launcher.icns"
              cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>VCB Mod Launcher</string>
            <key>CFBundleDisplayName</key><string>VCB Mod Launcher</string>
            <key>CFBundleIdentifier</key><string>io.github.n-popescu.vcb-launcher</string>
            <key>CFBundleVersion</key><string>0.1.0</string>
            <key>CFBundleShortVersionString</key><string>0.1.0</string>
            <key>CFBundleExecutable</key><string>vcb-launcher</string>
            <key>CFBundleIconFile</key><string>vcb-launcher</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
              # Zip the bundle (ditto preserves the bundle structure + resource metadata).
              ditto -c -k --keepParent "$APP" "dist/vcb-launcher-macos-universal.zip"
              rm -rf "$APP"
              ;;
          esac
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: vcb-launcher-${{ matrix.name }}
          path: dist/*

  # Publish a GitHub Release automatically. Two ways to trigger it, both producing a release
  # with auto-generated notes (the commits/PRs since the previous tag) and the built binaries:
  #   • push a `v*` tag manually, or
  #   • push to `main` with a bumped `version` in Cargo.toml — the job tags `v<version>` and
  #     releases it. If that tag already exists (no bump since the last release) it no-ops, so
  #     ordinary commits to main don't spam releases. This is what the in-app self-updater
  #     checks against, so every version bump that lands on main ships a release on its own.
  release:
    name: release
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags to tell whether this version was already released

      # Decide the tag and whether to publish.
      - id: decide
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Manual tag push: always publish it.
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            # Push to main: derive the tag from Cargo.toml and publish only if it's new.
            version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' Cargo.toml | head -n1)"
            tag="v${version}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "This version (${tag}) is already released — skipping."
              echo "publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "publish=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/download-artifact@v4
        if: steps.decide.outputs.publish == 'true'
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        if: steps.decide.outputs.publish == 'true'
        with:
          tag_name: ${{ steps.decide.outputs.tag }}
          name: ${{ steps.decide.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
